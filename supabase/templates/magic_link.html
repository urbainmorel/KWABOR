<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Code de vérification Kwabor</title>
  </head>
  <body style="margin:0;padding:24px;background:#f5f5f5;color:#111111;font-family:Arial,sans-serif;">
    <main style="max-width:520px;margin:0 auto;padding:32px;background:#ffffff;border-radius:16px;">
      <p style="margin:0 0 16px;font-size:14px;letter-spacing:0.08em;text-transform:uppercase;">Kwabor</p>
      <h1 style="margin:0 0 16px;font-size:24px;line-height:1.25;">Votre code de vérification</h1>
      <p style="margin:0 0 24px;font-size:16px;line-height:1.5;">
        Saisissez ce code dans l'application pour continuer. Ne le partagez avec personne.
      </p>
      <p style="margin:0 0 24px;font-size:32px;font-weight:700;letter-spacing:0.2em;line-height:1;text-align:center;">
        {{ .Token }}
      </p>
      <p style="margin:0;font-size:14px;line-height:1.5;color:#555555;">
        Si vous n'avez pas demandé ce code, ignorez cet email.
      </p>
    </main>
  </body>
</html>
