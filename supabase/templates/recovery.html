<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Réinitialisation du mot de passe Kwabor</title>
  </head>
  <body style="margin:0;background:#f5f5f5;color:#111111;font-family:Arial,sans-serif">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
      <tr>
        <td align="center" style="padding:32px 16px">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0"
            style="max-width:520px;background:#ffffff;border-radius:16px">
            <tr>
              <td style="padding:32px">
                <h1 style="margin:0 0 16px;font-size:24px;line-height:32px">Réinitialisez votre mot de passe</h1>
                <p style="margin:0 0 24px;font-size:16px;line-height:24px">
                  Saisissez ce code à 6 chiffres dans l’application Kwabor :
                </p>
                <p style="margin:0 0 24px;font-size:32px;font-weight:700;letter-spacing:8px;text-align:center">
                  {{ .Token }}
                </p>
                <p style="margin:0;font-size:14px;line-height:21px;color:#555555">
                  Si vous n’avez pas demandé cette réinitialisation, ignorez cet email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
