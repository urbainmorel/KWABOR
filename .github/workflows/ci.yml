name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Ensure ffprobe is available
        shell: bash
        run: |
          if ! command -v ffprobe >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes --no-install-recommends ffmpeg
          fi

      - name: Verify embedded onboarding media
        run: python3 tools/verify-onboarding-media.py

      - uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v6.2.0

      - uses: supabase/setup-cli@v2.1.1
        with:
          version: 2.84.2
          github-token: ${{ github.token }}

      - name: Quality gate
        run: ./gradlew check

      - name: Supabase database tests
        run: |
          supabase db start
          supabase test db

  ios:
    name: iOS simulator build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v6.2.0

      - name: Xcode version
        run: xcodebuild -version

      - name: Build shared iOS XCFrameworks
        run: ./gradlew :shared:assembleSharedDebugXCFramework :shared:assembleSharedReleaseXCFramework

      - name: Resolve pinned iOS packages
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project iosApp/Kwabor.xcodeproj \
            -scheme Kwabor

      - name: Build every iOS simulator configuration
        run: |
          for configuration in Debug Staging Release; do
            xcodebuild \
              -project iosApp/Kwabor.xcodeproj \
              -scheme Kwabor \
              -configuration "$configuration" \
              -destination 'generic/platform=iOS Simulator' \
              -disableAutomaticPackageResolution \
              CODE_SIGNING_ALLOWED=NO \
              build
          done
