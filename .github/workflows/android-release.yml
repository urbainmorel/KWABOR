name: Android release artifact

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target GitHub Environment
        required: true
        type: choice
        options:
          - staging
          - production
      version_code:
        description: Positive Play Store version code
        required: true
        type: string
      version_name:
        description: Semantic version, for example 1.0.0-rc.1
        required: true
        type: string

concurrency:
  group: android-release-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  artifact:
    name: Build ${{ inputs.environment }} artifact
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    env:
      KWABOR_ENVIRONMENT: ${{ inputs.environment }}
      KWABOR_SUPABASE_URL: ${{ vars.KWABOR_SUPABASE_URL }}
      KWABOR_SUPABASE_PUBLISHABLE_KEY: ${{ vars.KWABOR_SUPABASE_PUBLISHABLE_KEY }}
      KWABOR_VERSION_CODE: ${{ inputs.version_code }}
      KWABOR_VERSION_NAME: ${{ inputs.version_name }}
    steps:
      - name: Require protected main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Release artifacts may only be built from main." >&2
          exit 1

      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v6.2.0

      - name: Validate public mobile configuration
        shell: bash
        run: |
          if [[ -z "$KWABOR_SUPABASE_URL" || -z "$KWABOR_SUPABASE_PUBLISHABLE_KEY" ]]; then
            echo "The selected GitHub Environment is missing its Supabase client variables." >&2
            exit 1
          fi

      - name: Inject production upload keystore
        if: inputs.environment == 'production'
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KWABOR_ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KWABOR_ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KWABOR_ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KWABOR_ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "$KEYSTORE_BASE64" || -z "$KEYSTORE_PASSWORD" || -z "$KEY_ALIAS" || -z "$KEY_PASSWORD" ]]; then
            echo "The production upload-keystore secrets are incomplete." >&2
            exit 1
          fi
          keystore_path="$RUNNER_TEMP/kwabor-upload.jks"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"
          echo "::add-mask::$KEYSTORE_PASSWORD"
          echo "::add-mask::$KEY_ALIAS"
          echo "::add-mask::$KEY_PASSWORD"
          {
            echo "KWABOR_ANDROID_KEYSTORE_PATH=$keystore_path"
            echo "KWABOR_ANDROID_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD"
            echo "KWABOR_ANDROID_KEY_ALIAS=$KEY_ALIAS"
            echo "KWABOR_ANDROID_KEY_PASSWORD=$KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Build staging APK
        if: inputs.environment == 'staging'
        run: ./gradlew check :androidApp:assembleStaging

      - name: Build production Android App Bundle
        if: inputs.environment == 'production'
        run: ./gradlew check :androidApp:bundleRelease

      - name: Write artifact checksums
        shell: bash
        run: |
          if [[ "${{ inputs.environment }}" == "staging" ]]; then
            artifact="androidApp/build/outputs/apk/staging/androidApp-staging.apk"
          else
            artifact="androidApp/build/outputs/bundle/release/androidApp-release.aab"
          fi
          test -f "$artifact"
          sha256sum "$artifact" > androidApp/build/outputs/KWABOR-SHA256SUMS.txt

      - name: Upload staging artifact
        if: inputs.environment == 'staging'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: kwabor-android-staging-${{ inputs.version_name }}-${{ inputs.version_code }}
          path: |
            androidApp/build/outputs/apk/staging/androidApp-staging.apk
            androidApp/build/outputs/mapping/staging/mapping.txt
            androidApp/build/outputs/KWABOR-SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

      - name: Upload production artifact
        if: inputs.environment == 'production'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: kwabor-android-production-${{ inputs.version_name }}-${{ inputs.version_code }}
          path: |
            androidApp/build/outputs/bundle/release/androidApp-release.aab
            androidApp/build/outputs/mapping/release/mapping.txt
            androidApp/build/outputs/KWABOR-SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30
