name: iOS archive artifact

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target GitHub Environment
        required: true
        type: choice
        options:
          - staging
          - production
      build_number:
        description: Positive App Store build number
        required: true
        type: string
      version_name:
        description: Apple version number, for example 1.0.0
        required: true
        type: string

concurrency:
  group: ios-archive-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  archive:
    name: Build ${{ inputs.environment }} archive
    runs-on: macos-15
    timeout-minutes: 45
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    env:
      KWABOR_ENVIRONMENT: ${{ inputs.environment }}
      KWABOR_SUPABASE_URL: ${{ vars.KWABOR_SUPABASE_URL }}
      KWABOR_SUPABASE_PUBLISHABLE_KEY: ${{ vars.KWABOR_SUPABASE_PUBLISHABLE_KEY }}
      KWABOR_IOS_DEVELOPMENT_TEAM: ${{ vars.KWABOR_IOS_DEVELOPMENT_TEAM }}
      KWABOR_IOS_BUILD_NUMBER: ${{ inputs.build_number }}
      KWABOR_IOS_VERSION_NAME: ${{ inputs.version_name }}
    steps:
      - name: Require protected main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Archives may only be built from main." >&2
          exit 1

      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v6.2.0

      - name: Validate archive configuration
        shell: bash
        run: |
          if [[ -z "$KWABOR_SUPABASE_URL" || -z "$KWABOR_SUPABASE_PUBLISHABLE_KEY" ]]; then
            echo "The selected GitHub Environment is missing its Supabase client variables." >&2
            exit 1
          fi
          if [[ ! "$KWABOR_IOS_DEVELOPMENT_TEAM" =~ ^[A-Z0-9]{10}$ ]]; then
            echo "KWABOR_IOS_DEVELOPMENT_TEAM must be a 10-character Apple Team ID." >&2
            exit 1
          fi
          if [[ ! "$KWABOR_IOS_BUILD_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "The iOS build number must be a positive integer." >&2
            exit 1
          fi
          if [[ ! "$KWABOR_IOS_VERSION_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "The iOS version name must contain exactly three period-separated integers." >&2
            exit 1
          fi

      - name: Install signing assets
        shell: bash
        env:
          CERTIFICATE_BASE64: ${{ secrets.KWABOR_IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.KWABOR_IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.KWABOR_IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [[ -z "$CERTIFICATE_BASE64" || -z "$CERTIFICATE_PASSWORD" || -z "$PROVISIONING_PROFILE_BASE64" ]]; then
            echo "The selected environment has incomplete iOS signing secrets." >&2
            exit 1
          fi

          keychain_path="$RUNNER_TEMP/kwabor-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          certificate_path="$RUNNER_TEMP/kwabor-distribution.p12"
          profile_source="$RUNNER_TEMP/kwabor.mobileprovision"
          profile_plist="$RUNNER_TEMP/kwabor-profile.plist"

          printf '%s' "$CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          printf '%s' "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$profile_source"
          chmod 600 "$certificate_path" "$profile_source"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" login.keychain-db

          security cms -D -i "$profile_source" > "$profile_plist"
          profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$profile_plist")"
          profile_name="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$profile_plist")"
          profile_team="$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$profile_plist")"
          application_identifier="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$profile_plist")"
          aps_environment="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:aps-environment' "$profile_plist" 2>/dev/null || true)"
          apple_sign_in="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.applesignin:0' "$profile_plist" 2>/dev/null || true)"

          if [[ "$profile_team" != "$KWABOR_IOS_DEVELOPMENT_TEAM" || "$application_identifier" != *".com.kwabor.ios" ]]; then
            echo "The provisioning profile does not target the configured team and com.kwabor.ios." >&2
            exit 1
          fi
          if [[ "$aps_environment" != "production" || "$apple_sign_in" != "Default" ]]; then
            echo "The provisioning profile must include production APNs and Sign in with Apple." >&2
            exit 1
          fi

          installed_profile="$HOME/Library/MobileDevice/Provisioning Profiles/$profile_uuid.mobileprovision"
          mkdir -p "$(dirname "$installed_profile")"
          cp "$profile_source" "$installed_profile"

          echo "::add-mask::$CERTIFICATE_PASSWORD"
          echo "::add-mask::$keychain_password"
          {
            echo "KWABOR_IOS_KEYCHAIN_PATH=$keychain_path"
            echo "KWABOR_IOS_KEYCHAIN_PASSWORD=$keychain_password"
            echo "KWABOR_IOS_PROFILE_PATH=$installed_profile"
            echo "KWABOR_IOS_PROFILE_NAME=$profile_name"
          } >> "$GITHUB_ENV"

      - name: Build release XCFramework
        run: ./gradlew :shared:assembleSharedReleaseXCFramework

      - name: Archive signed app
        shell: bash
        run: |
          if [[ "$KWABOR_ENVIRONMENT" == "staging" ]]; then
            configuration="Staging"
          else
            configuration="Release"
          fi
          archive_path="$RUNNER_TEMP/Kwabor-$KWABOR_ENVIRONMENT.xcarchive"
          xcodebuild archive \
            -project iosApp/Kwabor.xcodeproj \
            -scheme Kwabor \
            -configuration "$configuration" \
            -destination 'generic/platform=iOS' \
            -archivePath "$archive_path" \
            KWABOR_ENVIRONMENT="$KWABOR_ENVIRONMENT" \
            KWABOR_SUPABASE_URL="$KWABOR_SUPABASE_URL" \
            KWABOR_SUPABASE_PUBLISHABLE_KEY="$KWABOR_SUPABASE_PUBLISHABLE_KEY" \
            KWABOR_MARKETING_VERSION="$KWABOR_IOS_VERSION_NAME" \
            KWABOR_CURRENT_PROJECT_VERSION="$KWABOR_IOS_BUILD_NUMBER" \
            KWABOR_DEVELOPMENT_TEAM="$KWABOR_IOS_DEVELOPMENT_TEAM" \
            DEVELOPMENT_TEAM="$KWABOR_IOS_DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$KWABOR_IOS_PROFILE_NAME" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KWABOR_IOS_KEYCHAIN_PATH"
          echo "KWABOR_IOS_ARCHIVE_PATH=$archive_path" >> "$GITHUB_ENV"

      - name: Verify signed archive
        shell: bash
        run: |
          app_path="$KWABOR_IOS_ARCHIVE_PATH/Products/Applications/Kwabor.app"
          info_plist="$app_path/Info.plist"
          entitlements_plist="$RUNNER_TEMP/kwabor-archive-entitlements.plist"

          test -f "$app_path/PrivacyInfo.xcprivacy"
          test -f "$app_path/Assets.car"
          test -d "$KWABOR_IOS_ARCHIVE_PATH/dSYMs/Kwabor.app.dSYM"
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$info_plist")" == "com.kwabor.ios" ]]
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$info_plist")" == "$KWABOR_IOS_VERSION_NAME" ]]
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$info_plist")" == "$KWABOR_IOS_BUILD_NUMBER" ]]
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :KWABOR_ENVIRONMENT' "$info_plist")" == "$KWABOR_ENVIRONMENT" ]]

          codesign --verify --deep --strict --verbose=2 "$app_path"
          codesign -d --entitlements :- "$app_path" > "$entitlements_plist"
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :aps-environment' "$entitlements_plist")" == "production" ]]
          [[ "$(/usr/libexec/PlistBuddy -c 'Print :com.apple.developer.applesignin:0' "$entitlements_plist")" == "Default" ]]

      - name: Package archive and checksum
        shell: bash
        run: |
          output_directory="$RUNNER_TEMP/kwabor-ios-output"
          mkdir -p "$output_directory"
          archive_zip="$output_directory/Kwabor-$KWABOR_ENVIRONMENT-$KWABOR_IOS_VERSION_NAME-$KWABOR_IOS_BUILD_NUMBER.xcarchive.zip"
          ditto -c -k --sequesterRsrc --keepParent "$KWABOR_IOS_ARCHIVE_PATH" "$archive_zip"
          shasum -a 256 "$archive_zip" > "$output_directory/KWABOR-SHA256SUMS.txt"
          echo "KWABOR_IOS_OUTPUT_DIRECTORY=$output_directory" >> "$GITHUB_ENV"

      - name: Upload signed archive
        uses: actions/upload-artifact@v7.0.1
        with:
          name: kwabor-ios-${{ inputs.environment }}-${{ inputs.version_name }}-${{ inputs.build_number }}
          path: ${{ env.KWABOR_IOS_OUTPUT_DIRECTORY }}
          if-no-files-found: error
          retention-days: 30

      - name: Remove signing assets
        if: always()
        shell: bash
        run: |
          keychain_path="${KWABOR_IOS_KEYCHAIN_PATH:-$RUNNER_TEMP/kwabor-signing.keychain-db}"
          security delete-keychain "$keychain_path" 2>/dev/null || true
          if [[ -n "${KWABOR_IOS_PROFILE_PATH:-}" ]]; then
            rm -f "$KWABOR_IOS_PROFILE_PATH"
          fi
          rm -f "$RUNNER_TEMP/kwabor-distribution.p12" \
            "$RUNNER_TEMP/kwabor.mobileprovision" \
            "$RUNNER_TEMP/kwabor-profile.plist" \
            "$RUNNER_TEMP/kwabor-archive-entitlements.plist"
